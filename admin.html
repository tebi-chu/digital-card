<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Digital Card 管理画面</title>

<link rel="stylesheet" href="admin.css">

</head>

<body>

<header class="header">

    Digital Card 管理画面

</header>

<div class="container">

    <div class="toolbar">

        <input
            type="text"
            id="searchBox"
            placeholder="名前またはIDで検索">

        <button
            class="button"
            id="newMemberButton">

            ＋ 新規ユーザー

        </button>

    </div>

    <table>

        <thead>

            <tr>

                <th>ID</th>

                <th>名前</th>

                <th>アカウント</th>

                <th>状態</th>

                <th>操作</th>

            </tr>

        </thead>

        <tbody id="memberTable">

            <tr>

                <td colspan="5" style="text-align:center; padding:40px;">

                    読み込み中...

                </td>

            </tr>

        </tbody>

    </table>

</div>

<script src="admin.js"></script>

</body>

</html>
