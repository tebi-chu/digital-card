<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Digital Card</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<div id="background"></div>

<div class="container">

    <div id="profileCard" class="card">

        <img
            id="iconImage"
            class="icon"
            src=""
            alt="icon">

        <h1 id="displayName"></h1>

        <p id="account"></p>

        <img
            id="mainPhoto"
            class="photo"
            src=""
            alt="photo">

        <p id="profileText"></p>
        <div class="sns-area">

            <a id="instagramBtn" class="sns-button" href="#" target="_blank">
                Instagram
            </a>

            <a id="threadsBtn" class="sns-button" href="#" target="_blank">
                Threads
            </a>

            <a id="xBtn" class="sns-button" href="#" target="_blank">
                X
            </a>

            <a id="youtubeBtn" class="sns-button" href="#" target="_blank">
                YouTube
            </a>

            <a id="websiteBtn" class="sns-button" href="#" target="_blank">
                Website
            </a>

        </div>

        <div class="contact-area">

            <a id="phoneBtn" class="contact-button" href="#">
                電話する
            </a>

            <a id="mailBtn" class="contact-button" href="#">
                メールする
            </a>

            <button
                id="saveContactBtn"
                class="contact-button">

                連絡先を保存

            </button>

        </div>    </div>

</div>

<script src="script.js"></script>

</body>
</html>
