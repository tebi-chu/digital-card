<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Card</title>
<meta name="description" content="Digital Card">
<meta name="theme-color" content="#667744">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="background"></div>
<div id="background-overlay"></div>

<main class="container py-5">
<div class="row justify-content-center">
<div class="col-12 col-md-10 col-lg-8">

<section id="profileCard" class="glass-card">

<header class="text-center mb-4">
<img id="iconImage" class="profile-icon" src="" alt="プロフィール画像">
<h1 id="displayName">Loading...</h1>
<p id="account" class="account"></p>
</header>

<div class="photo-area mb-4">
<img id="mainPhoto" class="main-photo" src="" alt="メイン画像">
</div>

<section class="profile-area mb-4">
<p id="profileText"></p>
</section>

<section class="social-area mb-4">
<div class="d-grid gap-3">
<a id="instagramBtn" class="social-button" target="_blank" rel="noopener">
<i class="bi bi-instagram"></i><span>Instagram</span>
</a>
<a id="threadsBtn" class="social-button" target="_blank" rel="noopener">
<i class="bi bi-threads"></i><span>Threads</span>
</a>
<a id="xBtn" class="social-button" target="_blank" rel="noopener">
<i class="bi bi-twitter-x"></i><span>X</span>
</a>
<a id="youtubeBtn" class="social-button d-none" target="_blank" rel="noopener">
<i class="bi bi-youtube"></i><span>YouTube</span>
</a>
<a id="websiteBtn" class="social-button d-none" target="_blank" rel="noopener">
<i class="bi bi-globe2"></i><span>Website</span>
</a>
<a id="phoneBtn" class="social-button d-none">
<i class="bi bi-telephone-fill"></i><span>電話</span>
</a>
<a id="mailBtn" class="social-button d-none">
<i class="bi bi-envelope-fill"></i><span>メール</span>
</a>
</div>
</section>

<section class="contact-area text-center">
<button id="saveContactBtn" class="contact-button">
<i class="bi bi-person-vcard-fill"></i>
<span>連絡先を保存</span>
</button>
</section>

<footer class="text-center mt-4">
<small id="footerText">Powered by GitHub Pages</small>
</footer>

</section>

</div>
</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
