<!DOCTYPE html>
<html lang="ja">

<head>

    <!-- =======================================
         Basic
    ======================================== -->

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Digital Card</title>

    <meta
        name="description"
        content="Digital Profile Card">

    <meta
        name="theme-color"
        content="#667744">

    <!-- =======================================
         Bootstrap
    ======================================== -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->

    <link
        rel="stylesheet"
        href="style.css">

</head>

<body>

<!-- ===============================
     Background
================================ -->

<div id="background"></div>

<div id="background-overlay"></div>

<!-- ===============================
     Main
================================ -->

<main class="container">

<div class="row justify-content-center">

<div class="col-lg-6 col-md-8 col-sm-12">

<!-- =======================================
     Glass Card
======================================= -->

<section
id="profileCard"
class="glass-card">

<!-- ===============================
     Header
================================ -->

<header
class="text-center">

<img

id="iconImage"

class="profile-icon"

src=""

alt="Profile Icon">

<h1

id="displayName"

class="mt-4">

Loading...

</h1>

<p

id="account"

class="account">

</p>

</header>

<!-- ===============================
     Main Photo
================================ -->

<div
class="photo-area">

<img

id="mainPhoto"

class="main-photo"

src=""

alt="Main Photo">

</div>

<!-- ===============================
     Profile
================================ -->

<section
class="profile-area">

<p

id="profileText">

Loading...

</p>

</section>
